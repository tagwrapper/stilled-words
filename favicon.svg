<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- キャンバス背景（漆黒） -->
    <rect width="512" height="512" fill="#000000" />
    
    <!-- 言葉の源泉（直径約1/10の白点） -->
    <!-- キャンバス512pxに対し、およそ50pxの直径 = 半径25px -->
    <circle cx="256" cy="256" r="25" fill="#FFFFFF" />
    
    <!-- 静止した波紋（右下の孤） -->
    <!-- 余白（間）を大きく取り、半径140の円軌道を描く。弧の長さは約100度。
         開始角度: 20度（右下）
         終了角度: 120度（左下寄り）
         x = cx + r * cos(θ), y = cy + r * sin(θ)
         Start(20deg): x = 256 + 140 * 0.9397 = 387.5, y = 256 + 140 * 0.3420 = 303.9
         End(120deg):  x = 256 + 140 * (-0.5) = 186.0, y = 256 + 140 * 0.8660 = 377.2
    -->
    <path d="M 387.5 303.9 A 140 140 0 0 1 186.0 377.2" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="10" 
          stroke-linecap="butt" />
</svg>
